<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cards Dinâmicos de Personagem</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
    padding: 20px;
  }

  h1 {
    text-align: center;
  }

  form {
    display: flex;
    flex-direction: column;
    max-width: 400px;
    margin: 0 auto 40px auto;
    gap: 10px;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }

  input {
    padding: 10px;
    font-size: 16px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }

  button {
    padding: 10px;
    font-size: 16px;
    border-radius: 5px;
    border: none;
    background-color: #007bff;
    color: #fff;
    cursor: pointer;
  }

  button:hover {
    background-color: #0056b3;
  }

  #cards-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
  }

  .card {
    width: 200px;
    height: 300px;
    background-color: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: transform 0.3s;
  }

  .card:hover {
    transform: translateY(-5px);
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .card .info {
    position: absolute;
    bottom: 0;
    background-color: rgba(0,0,0,0.8);
    color: #fff;
    width: 100%;
    height: 0;
    overflow: hidden;
    transition: height 0.3s ease;
    padding: 10px;
  }

  .card.show .info {
    height: 40%;
  }

  .delete-btn {
  position: absolute;
  top: 5px;
  right: 5px;

  width: 25px;
  height: 25px;

  display: flex;
  align-items: center;
  justify-content: center;

  background: red;
  color: white;
  border: none;
  border-radius: 50%;
  cursor: pointer;

  font-size: 14px;
  line-height: 1;
}
</style>
</head>
<body>

<h1>Adicionar Personagem</h1>

<form id="add-card-form">
  <label>Imagem:</label>

<label>
  <input type="radio" name="image-type" value="link" checked>
  Link
</label>

<label>
  <input type="radio" name="image-type" value="file">
  Galeria
</label>

<input type="text" id="image-link" placeholder="Link da imagem">
<input type="file" id="image-file" accept="image/*" style="display: none;">
  <input type="text" id="name" placeholder="Nome do personagem" required>
  <input type="text" id="class" placeholder="Classe" required>
  <input type="text" id="power" placeholder="Poder" required>
  <button type="submit">Adicionar Card</button>
</form>

<div id="cards-container">
  <!-- Os cards serão adicionados aqui dinamicamente -->
</div>

<script>
  const form = document.getElementById('add-card-form');
  const cardsContainer = document.getElementById('cards-container');

  const imageLinkInput = document.getElementById('image-link');
const imageFileInput = document.getElementById('image-file');
const radios = document.querySelectorAll('input[name="image-type"]');

radios.forEach(radio => {
  radio.addEventListener('change', () => {
    if (radio.value === 'link') {
      imageLinkInput.style.display = 'block';
      imageFileInput.style.display = 'none';
    } else {
      imageLinkInput.style.display = 'none';
      imageFileInput.style.display = 'block';
    }
  });
});

  form.addEventListener('submit', function(e) {
  e.preventDefault();

  const selectedType = document.querySelector('input[name="image-type"]:checked').value;
  const imageLink = imageLinkInput.value;
  const imageFile = imageFileInput.files[0];

  const name = document.getElementById('name').value;
  const charClass = document.getElementById('class').value;
  const power = document.getElementById('power').value;

  function createCard(imageSrc) {
    const card = document.createElement('div');
    card.classList.add('card');

    card.innerHTML = `
      <button class="delete-btn">✖</button>
      <img src="${imageSrc}" alt="${name}">
      <div class="info">
        <h3>Nome: ${name}</h3>
        <p>Classe: ${charClass}</p>
        <p>Poder: ${power}</p>
      </div>
    `;

    card.addEventListener('click', () => {
      card.classList.toggle('show');
    });

    card.querySelector('.delete-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      card.remove();
    });

    cardsContainer.appendChild(card);
  }

  if (selectedType === 'file') {
    if (!imageFile) {
      alert("Escolha uma imagem da galeria");
      return;
    }

    const reader = new FileReader();
    reader.onload = function(event) {
      createCard(event.target.result);
    };
    reader.readAsDataURL(imageFile);

  } else {
    if (!imageLink) {
      alert("Digite um link de imagem");
      return;
    }

    createCard(imageLink);
  }

  form.reset();

    // Botão de excluir
    card.querySelector('.delete-btn').addEventListener('click', (e) => {
      e.stopPropagation(); // impede o clique de abrir o card
      card.remove();
    });

    cardsContainer.appendChild(card);
    form.reset();
  });
</script>

</body>
</html>
